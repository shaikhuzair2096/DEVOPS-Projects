name: Kyverno Policy Check

on:
  pull_request:

jobs:
  kyverno-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Kyverno CLI
      run: |
        curl -LO https://github.com/kyverno/kyverno/releases/download/v1.12.0/kyverno-cli_linux_x86_64.tar.gz
        tar -xvf kyverno-cli_linux_x86_64.tar.gz
        sudo mv kyverno /usr/local/bin/

    - name: Validate Manifests
      run: |
        kyverno apply ./policies/ \
          --resource ./k8s/manifests/ \
          --detailed-results
